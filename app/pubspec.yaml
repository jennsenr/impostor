name: impostor
description: "A production-ready multiplayer game where you must find the impostor."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0-299.0.dev

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.7.2

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # State Management
  flutter_bloc: ^9.1.0
  get_it: ^8.0.2
  equatable: ^2.0.7

  # Storage & Utilities
  shared_preferences: ^2.5.2
  json_annotation: ^4.9.0
  intl: ^0.19.0
  uuid: ^4.5.1

  # UI
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  share_plus: ^10.1.4

  # Deep Linking
  app_links: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Testing
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  fake_async: ^1.3.1

  # Generation
  build_runner: ^2.4.15
  json_serializable: ^6.9.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/avatars/
    - assets/images/characters/
    - assets/images/expelled/
    - assets/images/icons/
    - assets/images/backgrounds/
    - assets/svg/
    - assets/lottie/
