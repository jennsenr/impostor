services:
  impostor-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - REDIS_ADDR=${REDIS_ADDR:-impostor-redis:6379}
      - GIN_MODE=${GIN_MODE:-release}
      - WORDS_FILE_PATH=internal/infrastructure/data/words.json
      - PUBLIC_DIR_PATH=public
    restart: unless-stopped
    depends_on:
      impostor-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  impostor-redis:
    container_name: impostor-redis
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  redis-data:
